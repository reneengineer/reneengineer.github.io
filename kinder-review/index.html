<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Review Game">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Nathaniel's Family Review Game!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:'Nunito',Arial,sans-serif;min-height:100vh;overflow-x:hidden;
  background:#1a1a2e;color:#e0e0e0;}
body.light-mode{background:#fdf8f3;color:#333;}

/* ===== FLOATING BACKGROUND ===== */
.bg-decor{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-shape{position:absolute;border-radius:50%;opacity:0.25;animation:bgFloat linear infinite;}
@keyframes bgFloat{0%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(180deg)}100%{transform:translateY(0) rotate(360deg)}}

/* ===== MENU ===== */
.menu{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:30px 16px 40px;gap:10px;position:relative;z-index:1;}
.menu h1{font-size:1.8em;color:#3d7a68;text-align:center;margin-bottom:0;text-shadow:0 2px 8px rgba(61,122,104,0.12);}
.menu .subtitle{font-size:0.95em;color:#6db89a;margin-bottom:6px;text-align:center;}
.family-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;max-width:420px;}
.family-row .mini-sprite{width:38px;display:inline-flex;flex-direction:column;align-items:center;overflow:visible;}
.family-row .mini-sprite svg{width:32px;height:40px;}
.family-row .mini-sprite .spr-name{font-size:6.5px;color:#888;white-space:nowrap;margin-top:1px;text-align:center;}
.menu-btn{
  width:94%;max-width:400px;padding:14px 16px;border:none;border-radius:18px;
  font-size:1.1em;font-weight:700;color:#fff;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 18px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.25);
  transition:transform 0.1s;text-align:left;position:relative;z-index:1;
}
.menu-btn:active{transform:scale(0.96)}
.menu-btn .icon{font-size:1.3em;flex-shrink:0}
.menu-btn .btn-desc{font-size:0.65em;font-weight:400;opacity:0.9;display:block}

/* ===== GAME SCREEN ===== */
.game-screen{display:none;min-height:100vh;padding:12px;padding-bottom:100px;position:relative;z-index:1;}
.game-screen.active{display:block}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-right:90px;position:relative;z-index:88;}
.back-btn{background:rgba(255,255,255,0.85);border:none;border-radius:50%;width:44px;height:44px;font-size:1.3em;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.scribble-btn{background:rgba(255,255,255,0.85);border:none;border-radius:50%;width:44px;height:44px;font-size:1.3em;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-left:6px;transition:background 0.2s,box-shadow 0.2s;}
.scribble-btn.active{background:#ff6f00;color:#fff;box-shadow:0 2px 12px rgba(255,111,0,0.4);}
.score-display{font-size:1.1em;font-weight:700;color:#3d7a68;background:rgba(255,255,255,0.85);padding:5px 14px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.progress-bar{width:100%;height:8px;background:rgba(255,255,255,0.5);border-radius:4px;margin-bottom:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,0.06);}
.progress-fill{height:100%;background:linear-gradient(90deg,#6db89a,#5ba4c9,#81d4fa);border-radius:4px;transition:width 0.4s ease;}

/* STORY BOX */
.story-box{
  background:rgba(255,255,255,0.92);border-radius:24px;padding:16px 14px;margin-bottom:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06);text-align:center;position:relative;
  backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,0.6);
}
.story-box .prompt-label{font-size:0.8em;color:#93c5a8;margin-bottom:3px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.story-box .story-text{font-size:1em;color:#555;line-height:1.45;margin-bottom:4px;}
.story-box .story-scene{display:flex;justify-content:center;align-items:flex-end;gap:8px;flex-wrap:wrap;margin:6px 0;min-height:70px;}
.story-box .main-q{font-size:1.25em;font-weight:900;color:#3a6b5a;margin-top:6px;}
.story-box .visual-row{font-size:2.5em;margin:4px 0;}
.story-box .hint-text{font-size:0.85em;color:#bbb;margin-top:3px;}
.story-box .tools-text{margin-top:4px;font-size:0.85em;color:#5ba4c9;font-weight:600;}

/* CHOICES */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;margin:0 auto;}
.choices.three-col{grid-template-columns:1fr 1fr 1fr;}
.choice-btn{
  padding:14px 8px;border:3px solid #d4e8dc;border-radius:18px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(4px);
  font-size:1.05em;font-weight:700;cursor:pointer;transition:all 0.15s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 3px 12px rgba(0,0,0,0.05);color:#333;
}
.choice-btn .choice-icon{font-size:1.5em;}
.choice-btn:active{transform:scale(0.95)}
.choice-btn.correct{background:#c8e6c9;border-color:#66bb6a;animation:pop 0.4s;}
.choice-btn.wrong{background:#ffcdd2;border-color:#ef5350;animation:shake 0.4s;}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes floatIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes handWave{0%,100%{transform:rotate(0)}25%{transform:rotate(15deg)}50%{transform:rotate(-10deg)}75%{transform:rotate(12deg)}}
@keyframes giveItem{0%{transform:translateX(0) scale(1)}50%{transform:translateX(15px) scale(1.15)}100%{transform:translateX(0) scale(1)}}

/* Sprite animations - idle */
.sprite-bounce{animation:bounce 1s ease-in-out infinite;}
.sprite-wiggle{animation:wiggle 0.8s ease-in-out infinite;}
.sprite-wave{animation:handWave 1s ease-in-out 2;}
.sprite-give{animation:giveItem 0.8s ease-in-out;}
.sprite-slidel{animation:slideInLeft 0.5s ease-out;}
.sprite-slider{animation:slideInRight 0.5s ease-out;}

/* ===== REACTION OVERLAY ===== */
.reaction-overlay{
  position:fixed;left:0;right:0;bottom:0;z-index:90;pointer-events:none;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  height:120px;overflow:visible;
  animation:reactionFade var(--reaction-dur, 1.4s) ease-out forwards;
}
@keyframes reactionFade{0%{opacity:0}10%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* CORRECT - party scene */
.reaction-correct{
  background:linear-gradient(transparent,rgba(102,187,106,0.12));
}
.reaction-correct .reaction-stage{
  display:flex;gap:4px;align-items:flex-end;justify-content:center;
  padding:4px 8px;
}
.reaction-correct .reaction-stage .sprite{animation:partyDance 0.4s ease-in-out infinite alternate;}
.reaction-correct .reaction-stage .sprite:nth-child(2){animation-delay:0.1s;animation-name:partyJump;}
.reaction-correct .reaction-stage .sprite:nth-child(3){animation-delay:0.2s;animation-name:partySpin;}
.reaction-correct .reaction-stage .sprite:nth-child(4){animation-delay:0.15s;}
.reaction-correct .party-emoji{font-size:1.2em;animation:partyFloat 0.6s ease-in-out infinite alternate;}
.reaction-correct .party-text{
  font-size:1.1em;font-weight:900;
  color:#43a047;text-shadow:0 2px 8px rgba(67,160,71,0.3);
  animation:partyTextPop 0.5s ease-out;margin-bottom:8px;
}

@keyframes partyDance{
  0%{transform:translateY(0) rotate(-8deg)}
  100%{transform:translateY(-12px) rotate(8deg)}
}
@keyframes partyJump{
  0%{transform:translateY(0) scale(1)}
  100%{transform:translateY(-20px) scale(1.1)}
}
@keyframes partySpin{
  0%{transform:rotate(-10deg) translateY(0)}
  100%{transform:rotate(10deg) translateY(-14px)}
}
@keyframes partyFloat{
  0%{transform:translateY(0) scale(1)}
  100%{transform:translateY(-15px) scale(1.2)}
}
@keyframes partyTextPop{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.2);opacity:1}
  100%{transform:scale(1);opacity:1}
}

/* WRONG - sad scene */
.reaction-wrong{
  background:linear-gradient(transparent,rgba(239,83,80,0.08));
}
.reaction-wrong .reaction-stage{
  display:flex;gap:4px;align-items:flex-end;justify-content:center;
  padding:4px 8px;
}
.reaction-wrong .reaction-stage .sprite{animation:sadDroop 0.6s ease-in-out infinite alternate;}
.reaction-wrong .reaction-stage .sprite:nth-child(2){animation-delay:0.15s;animation-name:sadShake;}
.reaction-wrong .reaction-stage .sprite:nth-child(3){animation-delay:0.1s;}
.reaction-wrong .sad-emoji{font-size:1.2em;animation:sadBounce 0.8s ease-in-out infinite alternate;}
.reaction-wrong .sad-text{
  font-size:1em;font-weight:700;
  color:#e57373;text-shadow:0 2px 8px rgba(229,115,115,0.2);
  animation:sadTextSlide 0.4s ease-out;margin-bottom:8px;
}

@keyframes sadDroop{
  0%{transform:translateY(0) rotate(0)}
  100%{transform:translateY(4px) rotate(-3deg)}
}
@keyframes sadShake{
  0%{transform:translateX(-3px)}
  100%{transform:translateX(3px)}
}
@keyframes sadBounce{
  0%{transform:translateY(0)}
  100%{transform:translateY(5px)}
}
@keyframes sadTextSlide{
  0%{transform:translateY(10px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}

/* Confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Streak badge */
.streak-badge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2em;font-weight:900;color:#ff6f00;text-shadow:0 2px 8px rgba(255,111,0,0.3);z-index:150;pointer-events:none;animation:streakPop 0.8s ease-out forwards;}
@keyframes streakPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}60%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-70%) scale(0.8)}}

/* Encourage bubble */
.encourage-bubble{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);color:#3d7a68;padding:8px 20px;border-radius:20px;font-weight:700;font-size:1.05em;z-index:150;pointer-events:none;animation:bubbleUp 1.4s ease-out forwards;box-shadow:0 4px 18px rgba(61,122,104,0.15);border:2px solid #c5ddd0;}
@keyframes bubbleUp{0%{opacity:0;transform:translateX(-50%) translateY(20px)}20%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}

/* RESULT */
.result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(4px);}
.result-overlay.active{display:flex}
.result-card{background:#fff;border-radius:28px;padding:28px 20px;text-align:center;max-width:380px;width:92%;animation:floatIn 0.4s ease;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
.result-card .big-emoji{font-size:3em}
.result-card h2{font-size:1.4em;margin:6px 0;color:#3a6b5a;}
.result-card p{font-size:0.95em;color:#666;margin-bottom:12px}
.result-card .stars{color:#ffc107;font-size:1.5em;letter-spacing:3px;margin:4px 0}
.result-card button{padding:12px 24px;border:none;border-radius:16px;background:linear-gradient(135deg,#5ba4c9,#6db89a);color:#fff;font-size:1em;font-weight:700;cursor:pointer;margin:4px;box-shadow:0 3px 12px rgba(91,164,201,0.25);}
.result-card button.green{background:linear-gradient(135deg,#43a047,#66bb6a);}
.result-card .result-scene{display:flex;justify-content:center;gap:4px;margin:8px 0;flex-wrap:wrap;}

/* SPRITE */
.sprite{display:inline-block;position:relative;}
.sprite svg{display:block;}
.sprite-label{font-size:0.6em;text-align:center;font-weight:700;color:#777;margin-top:1px;white-space:nowrap;}

/* FOOD */
.food-grid{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:8px 0;}
.food-item{font-size:2em;transition:all 0.3s;display:inline-block;position:relative;}
.food-item.eaten{opacity:0.35;filter:grayscale(0.8);}
.food-item.eaten::after{content:'✕';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.9em;color:#ef5350;font-weight:900;text-shadow:0 0 4px #fff,0 0 4px #fff,0 0 4px #fff;}
.food-item.avail{animation:foodPulse 1.5s ease-in-out infinite;}
@keyframes foodPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* SCORE LOG */
.score-log-btn{background:rgba(255,255,255,0.85);border:2px solid #c5ddd0;border-radius:14px;padding:6px 14px;font-size:0.85em;font-weight:700;color:#3d7a68;cursor:pointer;margin-top:6px;}
.log-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(4px);}
.log-overlay.active{display:flex}
.log-card{background:#fff;border-radius:24px;padding:24px 16px;max-width:400px;width:92%;max-height:80vh;overflow-y:auto;animation:floatIn 0.3s ease;}
.log-card h2{font-size:1.3em;color:#3a6b5a;text-align:center;margin-bottom:12px;}
.log-card table{width:100%;border-collapse:collapse;font-size:0.85em;}
.log-card th{background:#e5f0ea;color:#3d7a68;padding:8px 6px;text-align:left;border-radius:4px;}
.log-card td{padding:6px;border-bottom:1px solid #f0f0f0;color:#555;}
.log-card .log-perfect{color:#43a047;font-weight:700;}
.log-card .log-close{display:block;margin:12px auto 0;padding:10px 28px;border:none;border-radius:14px;background:linear-gradient(135deg,#5ba4c9,#6db89a);color:#fff;font-weight:700;font-size:1em;cursor:pointer;}
.log-card .log-empty{text-align:center;color:#bbb;padding:20px;font-size:1em;}

/* BILL */
.bill-card{display:inline-block;padding:10px 24px;border-radius:12px;font-size:1.5em;font-weight:900;border:3px dashed;margin:6px 0;}

/* PIE */
.pie-visual{margin:8px auto;width:90px;height:90px;border-radius:50%;border:3px solid #6db89a;box-shadow:0 3px 12px rgba(109,184,154,0.2);}

/* DRAG INTERACTIVE */
.drag-zone{display:flex;justify-content:center;align-items:flex-start;gap:16px;margin:10px 0;flex-wrap:wrap;}
.drag-basket{
  min-width:100px;min-height:80px;padding:8px;border-radius:16px;
  border:3px dashed #c5ddd0;background:rgba(255,255,255,0.6);
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center;
  transition:all 0.2s;position:relative;
}
.drag-basket.highlight{border-color:#6db89a;background:rgba(109,184,154,0.1);transform:scale(1.03);}
.drag-basket .basket-label{position:absolute;bottom:-18px;font-size:0.7em;font-weight:700;color:#888;white-space:nowrap;}
.drag-item{
  font-size:1.8em;cursor:grab;transition:transform 0.15s;touch-action:none;user-select:none;
}
.drag-item:active{cursor:grabbing;transform:scale(1.2);}
.drag-item.dragging{opacity:0.5;transform:scale(0.9);}
.drag-arrow{font-size:1.5em;color:#c5ddd0;align-self:center;}
.drag-submit{
  display:block;margin:8px auto 0;padding:8px 24px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#6db89a,#5ba4c9);color:#fff;font-weight:700;
  font-size:0.95em;cursor:pointer;opacity:0.5;pointer-events:none;transition:all 0.2s;
}
.drag-submit.ready{opacity:1;pointer-events:auto;animation:foodPulse 1.5s ease-in-out infinite;}
.drag-count{font-size:0.8em;color:#6db89a;font-weight:700;margin-top:2px;}

/* STAR STORE */
.store-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(4px);}
.store-overlay.active{display:flex}
.store-card{background:#fff;border-radius:24px;padding:20px 14px;max-width:420px;width:94%;max-height:85vh;overflow-y:auto;animation:floatIn 0.3s ease;}
.store-card h2{font-size:1.3em;color:#3a6b5a;text-align:center;margin-bottom:4px;}
.store-balance{text-align:center;font-size:1.1em;font-weight:700;color:#ff8f00;margin-bottom:10px;}
.store-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.store-item{
  text-align:center;padding:8px 4px;border-radius:14px;border:2px solid #e8e8e8;
  background:rgba(255,255,255,0.9);cursor:pointer;transition:all 0.2s;position:relative;
}
.store-item.locked{opacity:0.6;filter:grayscale(0.3);}
.store-item.locked::after{content:'🔒';position:absolute;top:2px;right:4px;font-size:0.8em;}
.store-item.owned{border-color:#6db89a;background:#e5f0ea;}
.store-item .item-emoji{font-size:2.2em;display:block;}
.store-item .item-name{font-size:0.65em;font-weight:700;color:#666;margin-top:2px;}
.store-item .item-price{font-size:0.7em;color:#ff8f00;font-weight:700;}
.store-close{display:block;margin:8px auto 0;padding:10px 28px;border:none;border-radius:14px;background:linear-gradient(135deg,#5ba4c9,#6db89a);color:#fff;font-weight:700;font-size:1em;cursor:pointer;}
.store-item-view{text-align:center;padding:16px;}
.store-item-view .big-item{font-size:5em;display:block;margin:10px 0;animation:pop 0.5s ease;}
.store-item-view .item-msg{font-size:0.95em;color:#666;margin:8px 0;}

/* ===== STORY MODE ===== */
.story-mode .chapter-title{font-size:1.3em;font-weight:900;color:#3a6b5a;text-align:center;margin-bottom:8px;animation:floatIn 0.5s ease;}
.story-mode .chapter-narrative{font-size:1em;color:#555;line-height:1.5;text-align:center;margin-bottom:10px;animation:floatIn 0.4s ease;}
.story-mode .chapter-scene{display:flex;justify-content:center;align-items:flex-end;gap:8px;flex-wrap:wrap;margin:10px 0;min-height:70px;}
.story-mode .chapter-instruction{font-size:0.9em;color:#5ba4c9;font-weight:700;text-align:center;margin:8px 0;}
.story-progress{display:flex;gap:4px;justify-content:center;margin-bottom:8px;}
.story-progress .ch-dot{width:28px;height:6px;border-radius:3px;background:#e0e0e0;transition:all 0.3s;}
.story-progress .ch-dot.done{background:#66bb6a;}
.story-progress .ch-dot.current{background:#42a5f5;animation:foodPulse 1.5s ease-in-out infinite;}

/* Cake canvas for swipe-slice */
.cake-canvas{position:relative;width:200px;height:200px;margin:10px auto;touch-action:none;}
.cake-canvas svg{width:100%;height:100%;}
.cake-canvas .slice-line{stroke:#e57373;stroke-width:3;stroke-linecap:round;}

/* Glass fill for pour interaction */
.glass-container{text-align:center;margin:10px auto;}
.glass-fill{width:80px;height:160px;border:4px solid #90caf9;border-top:none;border-radius:0 0 12px 12px;margin:0 auto;position:relative;overflow:hidden;background:#fff;}
.glass-liquid{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#ffcc80,#ff9800);transition:height 0.1s;border-radius:0 0 8px 8px;}
.glass-markers{position:absolute;left:-30px;top:0;bottom:0;width:26px;}
.glass-marker{position:absolute;right:0;font-size:0.6em;color:#999;font-weight:700;}
.glass-level-text{font-size:1.1em;font-weight:900;color:#e65100;margin-top:8px;}

/* Wallet for money-pick */
.wallet-zone{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0;}
.wallet-bill{padding:8px 16px;border-radius:10px;border:2px solid #c8e6c9;background:rgba(255,255,255,0.9);font-weight:700;font-size:1em;cursor:pointer;transition:all 0.15s;color:#2e7d32;}
.wallet-bill:active{transform:scale(0.95);}
.wallet-bill.selected{background:#c8e6c9;border-color:#43a047;box-shadow:0 2px 8px rgba(67,160,71,0.3);}

function toggleTheme(){

  try{localStorage.setItem('nathaniel_theme',isLight?'light':'dark');}catch(e){}
}
(function(){

})();

let audioCtx, soundMuted=false;
function getAC(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
// Unlock audio on first user interaction (iOS Safari requires this)
document.addEventListener('touchstart',function unlockAudio(){
  getAC();document.removeEventListener('touchstart',unlockAudio);
},{once:true});
document.addEventListener('click',function unlockAudio2(){
  getAC();document.removeEventListener('click',unlockAudio2);
},{once:true});
function toggleMute(){
  soundMuted=!soundMuted;
  document.getElementById('muteBtn').textContent=soundMuted?'🔇':'🔊';
}
function playTone(f,d,t,v){if(soundMuted)return;try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=v||0.13;g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}

function playFinish(){[523,659,784,1047,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.18,'triangle',0.15),i*110));}
function playPerfect(){[523,659,784,880,1047,1319,1568].forEach((f,i)=>setTimeout(()=>playTone(f,0.22,'sine',0.13),i*90));}

function spriteHTML(id,sz,anim){
  const c=CHARS[id];if(!c)return '';
  const s=sz||52;
  const cls=anim?' '+anim:'';
  return `<div class="sprite${cls}" style="width:${s}px;">
    ${c.svg}
    <div class="sprite-label">${c.name}</div>
  </div>`;
}

function bounceSpr(el){
  playTap();
  const anims=['sprite-bounce','sprite-wiggle','sprite-wave'];
  const a=anims[Math.floor(Math.random()*anims.length)];
  const svg=el.querySelector('svg');
  if(!svg)return;
  svg.classList.remove('sprite-bounce','sprite-wiggle','sprite-wave');
  void svg.offsetWidth;
  svg.classList.add(a);
  setTimeout(()=>svg.classList.remove(a),1000);
}

// Tag each question: 'easy','medium','hard'
(function tagDifficulty(){
  // Auto-tag by position: first 40%=easy, middle=medium, last 25%=hard
  Object.keys(DATA).forEach(topic=>{
    const arr=DATA[topic];const n=arr.length;
    arr.forEach((q,i)=>{
      q._id=topic+'_'+i;
      if(i<n*0.4) q.difficulty='easy';
      else if(i<n*0.75) q.difficulty='medium';
      else q.difficulty='hard';
    });
  });
})();

let currentGame='',questions=[],currentQ=0,score=0,streak=0,answered=false,totalStars=0,gameStartTime=0;
const enc=['Tama!','Magaling!','Ang galing!','Ayos!','Wow!','Astig!','Yehey!','Nice!','Galing mo!','Sana all!'];
const QUESTIONS_PER_SESSION=5;
const STAR_REWARD={easy:1,medium:2,hard:3};
const STAR_PENALTY=1;
const wenc=['Okay lang!','Try ulit!','Kaya mo yan!','Halos na!','Next time!'];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(type){
  currentGame=type;currentQ=0;score=0;streak=0;firstTryCorrect=true;totalStars=0;gameStartTime=Date.now();
  // Show money drawer button only for money-related games
  const mdBtn=document.getElementById('moneyDrawerBtn');
  mdBtn.style.display=(type==='money'||type==='compare')?'flex':'none';
  // Priority: previously wrong questions first, then fill remaining by difficulty
  const wrong=getWrongIds();
  const allQ=DATA[type];
  const wrongQs=allQ.filter(q=>wrong[q._id]);
  const rightQs=allQ.filter(q=>!wrong[q._id]);
  // Sort right questions: easy first for warmup, then medium, then hard
  const diffOrder={easy:0,medium:1,hard:2};
  rightQs.sort((a,b)=>(diffOrder[a.difficulty]||0)-(diffOrder[b.difficulty]||0));
  // Pick: up to 2 wrong ones + fill to 5 from right pool (shuffled within difficulty)
  let picked=shuffle(wrongQs).slice(0,2);
  const remaining=QUESTIONS_PER_SESSION-picked.length;
  // Mix difficulties: ~2 easy, ~2 medium, ~1 hard from available
  const easy=shuffle(rightQs.filter(q=>q.difficulty==='easy'));
  const med=shuffle(rightQs.filter(q=>q.difficulty==='medium'));
  const hard=shuffle(rightQs.filter(q=>q.difficulty==='hard'));
  const pool=[...easy.slice(0,2),...med.slice(0,2),...hard.slice(0,1),...easy.slice(2),...med.slice(2),...hard.slice(1)];
  picked=[...picked,...pool.filter(q=>!picked.includes(q)).slice(0,remaining)];
  questions=shuffle(picked).slice(0,QUESTIONS_PER_SESSION);
  document.getElementById('menu').style.display='none';
  document.getElementById('gameScreen').classList.add('active');
  showQuestion();
}

// Canvas stays pointer-events:none so buttons/choices still work.
// We listen on document and only draw when scribble is ON and target isn't a button/interactive.
let scribbleOn=false,scribbleDrawing=false,scribbleCtx=null;
function initScribbleCanvas(){
  const c=document.getElementById('scribbleCanvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  scribbleCtx=c.getContext('2d');
  scribbleCtx.lineCap='round';scribbleCtx.lineJoin='round';
  scribbleCtx.lineWidth=3;scribbleCtx.strokeStyle='#fff';
  scribbleCtx.shadowColor='rgba(255,255,255,0.6)';scribbleCtx.shadowBlur=6;
}
function isInteractive(el){
  if(!el)return false;
  const tag=el.tagName;
  if(tag==='BUTTON'||tag==='A'||tag==='INPUT'||tag==='SELECT')return true;
  if(el.classList&&(el.classList.contains('choice-btn')||el.classList.contains('drag-item')||el.classList.contains('wallet-bill')||el.classList.contains('md-item')||el.classList.contains('compare-sym')))return true;
  if(el.onclick||el.getAttribute('draggable')==='true')return true;
  if(el.parentElement)return isInteractive(el.parentElement);
  return false;
}
function toggleScribble(){
  scribbleOn=!scribbleOn;
  const c=document.getElementById('scribbleCanvas');
  const btn=document.getElementById('scribbleBtn');
  if(scribbleOn){
    c.style.display='block';
    initScribbleCanvas();
    btn.classList.add('active');
  }else{
    clearScribble();
  }
}
function clearScribble(){
  scribbleOn=false;scribbleDrawing=false;
  const c=document.getElementById('scribbleCanvas');
  c.style.display='none';
  if(scribbleCtx)scribbleCtx.clearRect(0,0,c.width,c.height);
  document.getElementById('scribbleBtn').classList.remove('active');
}
// Global document-level handlers for scribble
document.addEventListener('touchstart',function(e){
  if(!scribbleOn||isInteractive(e.target))return;
  scribbleDrawing=true;
  const t=e.touches[0];
  scribbleCtx.beginPath();scribbleCtx.moveTo(t.clientX,t.clientY);
},{passive:true});
document.addEventListener('touchmove',function(e){
  if(!scribbleDrawing)return;
  const t=e.touches[0];
  scribbleCtx.lineTo(t.clientX,t.clientY);scribbleCtx.stroke();
},{passive:true});
document.addEventListener('touchend',function(){scribbleDrawing=false;});
document.addEventListener('mousedown',function(e){
  if(!scribbleOn||isInteractive(e.target))return;
  scribbleDrawing=true;
  scribbleCtx.beginPath();scribbleCtx.moveTo(e.clientX,e.clientY);
});
document.addEventListener('mousemove',function(e){
  if(!scribbleDrawing)return;
  scribbleCtx.lineTo(e.clientX,e.clientY);scribbleCtx.stroke();
});
document.addEventListener('mouseup',function(){scribbleDrawing=false;});

function mdTrayStart(e){
  e.preventDefault();
  const item=e.currentTarget;
  const d=item.dataset;
  const pos=e.touches?e.touches[0]:e;
  // Create floating clone on the page (fixed position)
  const el=document.createElement('div');
  el.className='md-floating';
  if(d.type==='coin'){
    const s=parseInt(d.size);
    el.style.width=s+'px';el.style.height=s+'px';
    el.innerHTML=`<img src="${d.img}" style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.3);">`;
  }else{
    el.style.width=d.w+'px';el.style.height=d.h+'px';
    el.innerHTML=`<img src="${d.img}" style="width:${d.w}px;height:${d.h}px;border-radius:6px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.3);">`;
  }
  el.style.left=(pos.clientX-30)+'px';el.style.top=(pos.clientY-30)+'px';
  el.style.pointerEvents='auto';
  document.body.appendChild(el);
  const entry={el,value:parseFloat(d.value),label:d.label};
  mdPlaced.push(entry);
  updateMdTotal();
  mdDragging=entry;
  mdDragOff={x:30,y:30};
  el.style.transition='none';
  const moveHandler=mdDragMoveFixed;
  const upHandler=()=>{
    mdDragging=null;
    document.removeEventListener('touchmove',moveHandler);
    document.removeEventListener('mousemove',moveHandler);
    document.removeEventListener('touchend',upHandler);
    document.removeEventListener('mouseup',upHandler);
  };
  document.addEventListener('touchmove',moveHandler,{passive:false});
  document.addEventListener('mousemove',moveHandler);
  document.addEventListener('touchend',upHandler);
  document.addEventListener('mouseup',upHandler);
  // Double-tap to remove
  el.addEventListener('dblclick',()=>{mdRemove(entry);});
  // Long press to remove + drag on mobile
  let longPress;
  el.addEventListener('touchstart',(te)=>{
    te.preventDefault();
    longPress=setTimeout(()=>mdRemove(entry),500);
    mdDragging=entry;
    const tp=te.touches[0];
    const er=el.getBoundingClientRect();
    mdDragOff={x:tp.clientX-er.left,y:tp.clientY-er.top};
    const uh2=()=>{
      clearTimeout(longPress);mdDragging=null;
      document.removeEventListener('touchmove',mdDragMoveFixed);
      document.removeEventListener('touchend',uh2);
    };
    document.addEventListener('touchmove',mdDragMoveFixed,{passive:false});
    document.addEventListener('touchend',uh2);
  },{passive:false});
  el.addEventListener('mousedown',(me)=>{
    mdDragging=entry;
    const er=el.getBoundingClientRect();
    mdDragOff={x:me.clientX-er.left,y:me.clientY-er.top};
    const uh2=()=>{mdDragging=null;document.removeEventListener('mousemove',mdDragMoveFixed);document.removeEventListener('mouseup',uh2);};
    document.addEventListener('mousemove',mdDragMoveFixed);
    document.addEventListener('mouseup',uh2);
  });
}
function mdDragMoveFixed(e){
  if(!mdDragging)return;
  e.preventDefault();
  const pos=e.touches?e.touches[0]:e;
  mdDragging.el.style.left=(pos.clientX-mdDragOff.x)+'px';
  mdDragging.el.style.top=(pos.clientY-mdDragOff.y)+'px';
}
function mdRemove(entry){
  entry.el.remove();
  mdPlaced=mdPlaced.filter(p=>p!==entry);
  updateMdTotal();
}

function buildDrag(q){
  const items=q.dragItems;const target=q.dragTarget;const fromChar=q.dragFrom;
  return `<div class="drag-zone">
    <div class="drag-basket" id="dragFrom">
      ${items.map((it,i)=>`<span class="drag-item" data-idx="${i}" draggable="true">${it}</span>`).join('')}
      <span class="basket-label">${CHARS[fromChar]?CHARS[fromChar].name:'Nathaniel'}</span>
    </div>
    <span class="drag-arrow">➡️</span>
    <div class="drag-basket" id="dragTo">
      <span class="basket-label">${CHARS[target]?CHARS[target].name:target}</span>
    </div>
  </div>
  <div class="drag-count" id="dragCount">I-drag ang tamang bilang!</div>
  <button class="drag-submit" id="dragSubmit" onclick="checkDrag()">Tapos na!</button>`;
}

function initDrag(q){
  setTimeout(()=>{
    const fromBox=document.getElementById('dragFrom');
    const toBox=document.getElementById('dragTo');
    const submitBtn=document.getElementById('dragSubmit');
    const countEl=document.getElementById('dragCount');
    if(!fromBox||!toBox)return;

    let draggedEl=null;

    function updateCount(){
      const n=toBox.querySelectorAll('.drag-item').length;
      countEl.textContent=n>0?n+' item'+(n>1?'s':'')+' na binigay':'I-drag ang tamang bilang!';
      if(n>0){submitBtn.classList.add('ready');}else{submitBtn.classList.remove('ready');}
    }

    // Touch support
    function handleTouchStart(e){
      if(!e.target.classList.contains('drag-item'))return;
      draggedEl=e.target;
      draggedEl.classList.add('dragging');
      e.preventDefault();
    }
    function handleTouchMove(e){
      if(!draggedEl)return;
      e.preventDefault();
    }
    function handleTouchEnd(e){
      if(!draggedEl)return;
      const touch=e.changedTouches[0];
      const target=document.elementFromPoint(touch.clientX,touch.clientY);
      const basket=target?target.closest('.drag-basket'):null;
      if(basket && basket!==draggedEl.parentElement){
        basket.insertBefore(draggedEl,basket.querySelector('.basket-label'));
        playTap();
      }
      draggedEl.classList.remove('dragging');
      draggedEl=null;
      updateCount();
    }

    // HTML5 drag for desktop
    fromBox.addEventListener('dragstart',e=>{
      if(!e.target.classList.contains('drag-item'))return;
      draggedEl=e.target;
      e.target.classList.add('dragging');
    });
    toBox.addEventListener('dragstart',e=>{
      if(!e.target.classList.contains('drag-item'))return;
      draggedEl=e.target;
      e.target.classList.add('dragging');
    });
    [fromBox,toBox].forEach(box=>{
      box.addEventListener('dragover',e=>{e.preventDefault();box.classList.add('highlight');});
      box.addEventListener('dragleave',()=>box.classList.remove('highlight'));
      box.addEventListener('drop',e=>{
        e.preventDefault();box.classList.remove('highlight');
        if(draggedEl&&draggedEl.parentElement!==box){
          box.insertBefore(draggedEl,box.querySelector('.basket-label'));
          playTap();
        }
        if(draggedEl)draggedEl.classList.remove('dragging');
        draggedEl=null;
        updateCount();
      });
    });

    // Touch events
    document.getElementById('storyBox').addEventListener('touchstart',handleTouchStart,{passive:false});
    document.getElementById('storyBox').addEventListener('touchmove',handleTouchMove,{passive:false});
    document.getElementById('storyBox').addEventListener('touchend',handleTouchEnd);

    window._dragQ=q;
  },100);
}

function checkDrag(){
  const q=window._dragQ;if(!q)return;
  const toBox=document.getElementById('dragTo');
  const given=toBox.querySelectorAll('.drag-item').length;
  const correct=q.dragAnswer;
  if(given===correct){
    playCorrect();
    answered=true;
    if(firstTryCorrect){
      score++;
      const reward=STAR_REWARD[q.difficulty]||1;
      totalStars+=reward;
      clearWrong(q._id);
    }
    streak=firstTryCorrect?streak+1:0;
    document.getElementById('scoreDisplay').textContent='⭐ '+totalStars;
    showReaction(true);
    showEncouragement(firstTryCorrect?enc[Math.floor(Math.random()*enc.length)]:'Tama na!');
    document.getElementById('dragSubmit').style.display='none';
    setTimeout(()=>showLessonSummary(q),1600);
  }else{
    firstTryCorrect=false;
    streak=0;
    markWrong(q._id);
    totalStars=Math.max(0,totalStars-STAR_PENALTY);
    document.getElementById('scoreDisplay').textContent='⭐ '+totalStars;
    playWrong();
    showReaction(false);
    document.getElementById('dragCount').textContent=given>correct?'Ang dami! Bawasan mo.':'Kulang pa! Dagdagan mo.';
  }
}

    });
    const em3=document.createElement('span');
    em3.className='party-emoji';
    em3.textContent=partyEmojis[Math.floor(Math.random()*partyEmojis.length)];
    stage.appendChild(em3);
  }else{
    const txt=document.createElement('div');
    txt.className='sad-text';
    txt.textContent=wrongPhrases[Math.floor(Math.random()*wrongPhrases.length)];
    stage.appendChild(txt);
    const em=document.createElement('span');
    em.className='sad-emoji';
    em.textContent=sadEmojis[Math.floor(Math.random()*sadEmojis.length)];
    stage.appendChild(em);
    picked.slice(0,2).forEach(id=>{
      const wrap=document.createElement('div');
      wrap.innerHTML=spriteHTML(id,26);
      stage.appendChild(wrap);
    });
  }

  overlay.appendChild(stage);
  // Reaction duration: fixed 1.5s max
  const dur=1.5;
  overlay.style.setProperty('--reaction-dur', dur+'s');
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.remove(), dur*1000 + 400);
}

// ===== LESSON SUMMARIES =====
function getLessonSummary(q){
  // Fractions
  if(q.answer&&q.answer.includes('/')){
    const parts=q.answer.split('/');
    return `📖 ${q.answer} ibig sabihin ${parts[0]} sa ${parts[1]} na bahagi. Kapag may ${parts[1]} piraso at kinuha ang ${parts[0]}, ang fraction ay ${q.answer}.`;
  }
  // Compare
  if(q.visual==='compare'){
    const lv=q.leftSide.total,rv=q.rightSide.total;
    const sym=q.answer;
    return `⚖️ ${q.leftDesc} = ₱${lv} ${sym} ${q.rightDesc} = ₱${rv}. ${lv===rv?'Pareho sila!':lv>rv?'Ang kaliwa ang mas malaki!':'Ang kanan ang mas malaki!'}`;
  }
  // Money
  if(q.visual==='money'&&q.denom) return `💰 Ito ang ${q.denom}. Tandaan: ang kulay at laki ng pera ay iba-iba depende sa halaga nito.`;
  if(q.q&&q.q.includes('sukli')){const s=q.answer;return `💰 Ang sukli ay ${s}. Pag nagbayad ka ng mas malaki, ibabawas ang presyo para makuha ang sukli.`;}
  if(q.q&&q.q.includes('lahat')){return `💰 Ang sagot ay ${q.answer}. Pag maraming pera, i-add mo lahat para malaman ang total.`;}
  if(q.q&&q.q.includes('mas mahal')) return `💰 Ang mas mahal ay ang may mas mataas na presyo. ${q.answer} ang mas mahal.`;
  // Matter
  if(q.answer==='Solid') return `🧊 SOLID — may sariling hugis at hindi agad nagbabago. Hindi ito dumadaloy. Halimbawa: bato, yelo, kutsara, sapatos.`;
  if(q.answer==='Liquid') return `💧 LIQUID — dumadaloy at sumusunod sa hugis ng lalagyan. Halimbawa: tubig, gatas, juice, toyo.`;
  if(q.answer==='Gas') return `💨 GAS — kumakalat sa hangin at hindi mo hawakan. Hindi mo rin makita minsan! Halimbawa: hangin, usok, steam, amoy.`;
  // Komunidad
  if(q.answer==='Simbahan') return `⛪ SIMBAHAN — dito nagdadasal ang pamilya. May krus sa taas at kampana.`;
  if(q.answer==='Paaralan') return `🏫 PAARALAN — dito nag-aaral ang mga bata. May guro, libro, at blackboard.`;
  if(q.answer==='Pamilihan') return `🏪 PAMILIHAN — dito bumibili ng pagkain, gulay, at isda. Tinatawag din itong palengke.`;
  if(q.answer==='Bahay') return `🏠 BAHAY — dito nakatira ang pamilya. Dito sila kumakain, natutulog, at nagpapahinga.`;
  if(q.answer==='Parke') return `🏞️ PARKE — dito naglalaro at nag-eexercise. May puno, damo, at playground.`;
  // Helpers
  if(q.answer==='Pulis') return `👮 PULIS — nagbabantay sa kaligtasan ng mga tao. Gamit nila: posas, patrol car, at baril.`;
  if(q.answer==='Doktor') return `👨‍⚕️ DOKTOR — nagpapagaling ng may sakit. Gamit nila: stethoscope, thermometer, at gamot.`;
  if(q.answer==='Guro') return `👩‍🏫 GURO — nagtuturo sa mga bata. Gamit nila: chalk, blackboard, at libro.`;
  if(q.answer==='Bumbero') return `🚒 BUMBERO — pumapatay ng apoy. Gamit nila: fire truck, fire hose, at flashlight.`;
  if(q.answer==='Pandero') return `🍞 PANDERO — gumagawa ng tinapay at pandesal. Gamit nila: oven, harina, at palayok.`;
  if(q.answer==='Mangingisda') return `🎣 MANGINGISDA — nanghuhuli ng isda. Gamit nila: bangka, lambat, at pamingwit.`;
  return `✅ Ang tamang sagot ay: ${q.answer}`;
}

// ===== RETRY LOGIC =====
let firstTryCorrect=true;

function pickAnswer(btn,picked,correct){
  if(answered)return;
  const q=questions[currentQ];
  if(picked===correct){
    answered=true;
    btn.classList.add('correct');
    if(firstTryCorrect){
      score++;
      const reward=STAR_REWARD[q.difficulty]||1;
      totalStars+=reward;
      clearWrong(q._id);
      document.getElementById('scoreDisplay').textContent='⭐ '+totalStars;
    }
    streak = firstTryCorrect ? streak+1 : 0;
    playCorrect();
    showReaction(true);
    showEncouragement(firstTryCorrect ? enc[Math.floor(Math.random()*enc.length)] : 'Tama na!');
    if(firstTryCorrect && streak===3){showStreakBadge('🔥 3 Streak!');playStreak();}
    else if(firstTryCorrect && streak===5){showStreakBadge('🔥🔥 5 Streak!');playStreak();spawnConfetti(15);}
    else if(firstTryCorrect && streak>=QUESTIONS_PER_SESSION){showStreakBadge('🔥🔥🔥 PERFECT!');playStreak();spawnConfetti(25);}
    if(navigator.vibrate)navigator.vibrate(50);
    // Show lesson summary + manual next button
    setTimeout(()=>showLessonSummary(q),1600);
  }else{
    firstTryCorrect=false;
    streak=0;
    markWrong(q._id);
    totalStars=Math.max(0,totalStars-STAR_PENALTY);
    document.getElementById('scoreDisplay').textContent='⭐ '+totalStars;
    btn.classList.add('wrong');
    btn.style.pointerEvents='none';
    btn.style.opacity='0.4';
    playWrong();
    showReaction(false);
    if(navigator.vibrate)navigator.vibrate([50,50,50]);
    // Show lesson hint on wrong answer
    showWrongHint(q);
  }
}

function showWrongHint(q){
  // Remove existing hint if any
  const old=document.getElementById('wrongHint');
  if(old)old.remove();
  const hint=getLessonSummary(q);
  const hintEl=document.createElement('div');
  hintEl.id='wrongHint';
  hintEl.style.cssText='grid-column:1/-1;background:rgba(255,152,0,0.12);border:2px solid #ffa726;border-radius:14px;padding:12px 14px;text-align:center;animation:floatIn 0.3s ease;margin-top:4px;';
  hintEl.innerHTML=`<div style="font-size:0.75em;color:#ffb74d;font-weight:700;margin-bottom:4px;">💡 HINT</div><div style="font-size:0.85em;color:#ffe0b2;line-height:1.4;">${hint}</div>`;
  document.getElementById('choicesBox').appendChild(hintEl);
}

function showResult(){
  const pct=Math.round((score/questions.length)*100);
  let emoji,title,msg;
  if(pct===100){emoji='🏆';title='PERFECT, Nathaniel!';msg='Proud na proud si Lola Delia sa langit!';playPerfect();spawnConfetti(60);}
  else if(pct>=80){emoji='🌟';title='Ang galing mo, Nathaniel!';msg='Halos perfect! Kaunti na lang!';playFinish();spawnConfetti(30);}
  else if(pct>=60){emoji='😊';title='Magaling! Try ulit!';msg='Practice lang nang practice!';playFinish();}
  else{emoji='💪';title='Kaya mo yan, Nathaniel!';msg='Maglaro tayo ulit!';playFinish();}

  // Save to session log
  saveSession(currentGame,score,questions.length);
  addStoreStars(totalStars); // Save earned stars to store

  document.getElementById('resultCard').innerHTML=`
    <div class="big-emoji">${emoji}</div>
    <h2>${title}</h2>
    <div class="stars">${'⭐'.repeat(Math.max(1,totalStars))}</div>

}

let storyChapter=0, storyStars=0, storySubQ=0, storyMode=false;

function getStoryProgress(){
  try{return JSON.parse(localStorage.getItem('nathaniel_story')||'{"chapter":0}');}catch(e){return {chapter:0};}
}
function saveStoryProgress(ch){
  try{localStorage.setItem('nathaniel_story',JSON.stringify({chapter:ch}));}catch(e){}
}

function startStory(){
  storyMode=true;storyChapter=0;storyStars=0;storySubQ=0;
  document.getElementById('menu').style.display='none';
  document.getElementById('gameScreen').classList.add('active');
  showChapter();
}

function showChapter(){
  clearScribble();
  if(storyChapter>=STORY_CHAPTERS.length){showStoryResult();return;}
  const ch=STORY_CHAPTERS[storyChapter];
  storySubQ=0;

  // Progress bar shows chapter progress
  document.getElementById('scoreDisplay').textContent='⭐ '+storyStars;
  document.getElementById('progressFill').style.width=((storyChapter/STORY_CHAPTERS.length)*100)+'%';

  const sb=document.getElementById('storyBox');
  const cb=document.getElementById('choicesBox');

  let h='<div class="story-mode chapter-enter">';
  // Chapter progress dots
  h+='<div class="story-progress">';
  for(let i=0;i<STORY_CHAPTERS.length;i++){
    const cls=i<storyChapter?'ch-dot done':(i===storyChapter?'ch-dot current':'ch-dot');
    h+=`<div class="${cls}"></div>`;
  }
  h+='</div>';
  h+=`<div class="chapter-title">Chapter ${storyChapter+1}: ${ch.title}</div>`;
  // Scene illustration
  if(SCENE_IMGS[ch.id]) h+=`<div style="margin:6px 0;">${SCENE_IMGS[ch.id]}</div>`;
  h+=`<div class="chapter-narrative">${ch.scene.replace(/\n/g,'<br>')}</div>`;

  // Characters
  if(ch.chars&&ch.chars.length>0){
    h+='<div class="chapter-scene">';
    ch.chars.forEach((c,i)=>{
      const delay=i*0.15;
      if(ch.id==='prayer'&&c.id==='lola_delia'){
        h+=`<div class="angel-glow" style="animation-delay:${delay}s">${spriteHTML(c.id,60,c.a)}</div>`;
      }else{
        h+=`<div style="animation-delay:${delay}s">${spriteHTML(c.id,50,c.a)}</div>`;
      }
    });
    h+='</div>';
  }

  if(ch.instruction) h+=`<div class="chapter-instruction">${ch.instruction}</div>`;
  // Reset button for tricky interactions
  if(ch.type!=='narrative') h+=`<button class="story-reset-btn" onclick="playTap();resetChapter()">🔄 Ulitin ang Chapter</button>`;

  // Build interaction area
  if(ch.type==='swipe-slice') h+=buildSwipeSlice(ch);
  else if(ch.type==='fill-pour') h+=buildFillPour(ch);
  else if(ch.type==='money-pick') h+=buildMoneyPick(ch);
  else if(ch.type==='map-tap') h+=buildMapTap(ch);
  else if(ch.type==='narrative') h+=buildNarrative(ch);

  h+='</div>';
  sb.innerHTML=h;
  sb.style.animation='none';sb.offsetHeight;sb.style.animation='floatIn 0.4s ease';

  if(ch.type==='choice') buildStoryChoice(ch, cb);
  else cb.innerHTML='';

  // Init interactive handlers after DOM renders
  setTimeout(()=>{
    if(ch.type==='swipe-slice') initSwipeSlice(ch);
    else if(ch.type==='fill-pour') initFillPour(ch);
    else if(ch.type==='money-pick') initMoneyPick(ch);
    else if(ch.type==='map-tap') initMapTap(ch);
  },150);
}

    </svg>
  </div>
  <div id="sliceCount" style="text-align:center;font-size:0.9em;color:#e65100;font-weight:700;">0 / ${ch.target} na hiwa</div>
  <button class="story-next-btn" id="sliceCheck" style="opacity:0.4;pointer-events:none;" onclick="checkSlice()">Tapos na!</button>`;
}

function initSwipeSlice(ch){
  const canvas=document.getElementById('cakeCanvas');
  const svg=document.getElementById('cakeSvg');
  const linesG=document.getElementById('sliceLines');
  if(!canvas||!svg)return;
  let drawing=false, startX, startY, sliceCount=0;

  function getPos(e){
    const rect=svg.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x:((t.clientX-rect.left)/rect.width)*200, y:((t.clientY-rect.top)/rect.height)*200};
  }

  function onStart(e){
    e.preventDefault();
    const p=getPos(e);startX=p.x;startY=p.y;drawing=true;
  }
  function onEnd(e){
    if(!drawing)return;drawing=false;
    const t=e.changedTouches?e.changedTouches[0]:e;
    const rect=svg.getBoundingClientRect();
    const endX=((t.clientX-rect.left)/rect.width)*200;
    const endY=((t.clientY-rect.top)/rect.height)*200;
    const dist=Math.sqrt((endX-startX)**2+(endY-startY)**2);
    if(dist>40){
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',startX);line.setAttribute('y1',startY);
      line.setAttribute('x2',endX);line.setAttribute('y2',endY);
      line.setAttribute('class','slice-line');
      linesG.appendChild(line);
      sliceCount++;playTap();
      document.getElementById('sliceCount').textContent=sliceCount+' / '+ch.target+' na hiwa';
      if(sliceCount>=ch.target-1){
        const btn=document.getElementById('sliceCheck');
        btn.style.opacity='1';btn.style.pointerEvents='auto';
      }
    }
  }

  canvas.addEventListener('mousedown',onStart);
  canvas.addEventListener('mouseup',onEnd);
  canvas.addEventListener('touchstart',onStart,{passive:false});
  canvas.addEventListener('touchend',onEnd);
  window._storySliceCount=()=>linesG.querySelectorAll('line').length;
}

function checkSlice(){
  const ch=STORY_CHAPTERS[storyChapter];
  const lines=window._storySliceCount?window._storySliceCount():0;
  if(lines>=ch.target-1){
    playCorrect();spawnConfetti(15);
    storyStars+=ch.starReward;
    showEncouragement('Magaling! Nahati mo ang cake!');
    document.getElementById('scoreDisplay').textContent='⭐ '+storyStars;
    setTimeout(()=>{storyChapter++;showChapter();},1800);
  }else{
    playWrong();
    showEncouragement('Kulang pa ang hiwa! Dagdagan mo!');
  }
}

      </div>

        <div style="position:absolute;bottom:50%;right:0;font-size:0.65em;color:#999;font-weight:700;">― 1/2</div>

      </div>
    </div>

  </div>

}

function initFillPour(ch){
  const glass=document.getElementById('glassFill');
  const liquid=document.getElementById('glassLiquid');
  const levelText=document.getElementById('glassLevel');
  if(!glass)return;
  let filling=false, level=0, fillInterval;

  function startFill(e){
    e.preventDefault();
    if(filling)return;filling=true;
    fillInterval=setInterval(()=>{
      level=Math.min(100,level+1.5);
      liquid.style.height=level+'%';
      levelText.textContent=Math.round(level)+'%';
    },50);
  }
  function stopFill(e){
    filling=false;
    if(fillInterval)clearInterval(fillInterval);
  }

  glass.addEventListener('mousedown',startFill);
  glass.addEventListener('mouseup',stopFill);
  glass.addEventListener('mouseleave',stopFill);
  glass.addEventListener('touchstart',startFill,{passive:false});
  glass.addEventListener('touchend',stopFill);
  window._pourLevel=()=>level;
}

function checkPour(){
  const ch=STORY_CHAPTERS[storyChapter];
  const level=window._pourLevel?window._pourLevel():0;
  const targetPct=ch.target*100;
  const diff=Math.abs(level-targetPct);
  if(diff<=10){
    playCorrect();spawnConfetti(12);
    storyStars+=ch.starReward;
    showEncouragement(diff<=5?'Perpekto!':'Magaling! Halos tamang-tama!');
    document.getElementById('scoreDisplay').textContent='⭐ '+storyStars;
    setTimeout(()=>{storyChapter++;showChapter();},1800);
  }else{
    playWrong();
    showEncouragement(level<targetPct?'Kulang pa! Dagdagan mo!':'Sobra na! Bawasan!');
  }
}

// ---- CHOICE (Chapter 4 & 7) ----
function buildStoryChoice(ch, cb){
  const qs=ch.questions;
  const q=qs[storySubQ]||qs[0];
  // Show question text in story box
  let qBox=document.getElementById('storyChoiceQ');
  if(!qBox){
    qBox=document.createElement('div');
    qBox.id='storyChoiceQ';
    qBox.style.cssText='font-size:1.2em;font-weight:900;color:#3a6b5a;text-align:center;margin:10px 0 4px;animation:floatIn 0.3s ease;';
    const sb=document.getElementById('storyBox');
    const resetBtn=sb.querySelector('.story-reset-btn');
    if(resetBtn) sb.querySelector('.story-mode').insertBefore(qBox,resetBtn);
    else sb.querySelector('.story-mode').appendChild(qBox);
  }
  qBox.textContent=`Tanong ${storySubQ+1}/${qs.length}: ${q.q}`;
  // Dark mode color
  if(!document.body.classList.contains('light-mode')) qBox.style.color='#81d4fa';

  cb.className=q.choices.length===3?'choices three-col':'choices';
  const sc=shuffle(q.choices);
  cb.innerHTML=sc.map(c=>{
    const icon=getChoiceIcon(c);
    return `<button class="choice-btn" onclick="playTap();pickStoryChoice(this,'${esc(c)}','${esc(q.answer)}')">${icon?'<span class="choice-icon">'+icon+'</span>':''}${c}</button>`;
  }).join('');
}

function pickStoryChoice(btn,picked,correct){
  const ch=STORY_CHAPTERS[storyChapter];
  if(picked===correct){
    btn.classList.add('correct');
    playCorrect();
    showReaction(true);
    showEncouragement(enc[Math.floor(Math.random()*enc.length)]);
    storySubQ++;
    if(storySubQ>=ch.questions.length){
      storyStars+=ch.starReward;
      document.getElementById('scoreDisplay').textContent='⭐ '+storyStars;
      setTimeout(()=>{storyChapter++;showChapter();},1800);
    }else{
      setTimeout(()=>buildStoryChoice(ch, document.getElementById('choicesBox')),1200);
    }
  }else{
    btn.classList.add('wrong');
    btn.style.pointerEvents='none';btn.style.opacity='0.4';
    playWrong();showReaction(false);
  }
}

// ===== STORY UNLOCK LOGIC =====
const ALL_TOPICS=['fractions','money','matter','komunidad','helpers'];

function getCompletedTopics(){
  const log=getSessionLog();
  const done=new Set();
  log.forEach(s=>{ if(ALL_TOPICS.includes(s.topic)) done.add(s.topic); });
  return done;
}

function isStoryUnlocked(){
  try{ if(localStorage.getItem('nathaniel_story_unlocked')==='true') return true; }catch(e){}
  const done=getCompletedTopics();
  return ALL_TOPICS.every(t=>done.has(t));
}

function updateStoryBtn(){
  const btn=document.getElementById('storyBtn');
  const label=document.getElementById('storyBtnLabel');
  if(!btn||!label) return;
  const unlocked=isStoryUnlocked();
  const done=getCompletedTopics();
  if(unlocked){
    btn.style.background='linear-gradient(135deg,#ff8a65,#ff5722)';
    btn.style.opacity='1';
    label.innerHTML='Birthday Adventure<span class="btn-desc">Interactive na kwento ni Nathaniel!</span>';
  }else{
    btn.style.background='linear-gradient(135deg,#666,#444)';
    btn.style.opacity='0.7';
    const missing=ALL_TOPICS.filter(t=>!done.has(t));
    const names={fractions:'Fractions',money:'Money',matter:'Solid/Liquid/Gas',komunidad:'Komunidad',helpers:'Mga Tumutulong'};
    const left=missing.map(t=>names[t]).join(', ');
    label.innerHTML='🔒 Birthday Adventure<span class="btn-desc">Laruin muna: '+left+'</span>';
  }
}

function tryStartStory(){
  if(isStoryUnlocked()){
    startStory();
  }else{
    const done=getCompletedTopics();
    const missing=ALL_TOPICS.filter(t=>!done.has(t));
    const names={fractions:'Fractions',money:'Money',matter:'Solid/Liquid/Gas',komunidad:'Komunidad',helpers:'Mga Tumutulong'};
    alert('Laruin muna ang lahat ng topics para ma-unlock!\n\nKulang pa: '+missing.map(t=>names[t]).join(', '));
  }
}

function toggleStoryLock(){
  const pw=prompt('Enter password to toggle story lock:');
  if(pw==='2020'){
    const current=localStorage.getItem('nathaniel_story_unlocked')==='true';
    if(current){
      localStorage.removeItem('nathaniel_story_unlocked');
      alert('Birthday Adventure locked. Kailangan muna laruin ang lahat ng topics.');
    }else{
      localStorage.setItem('nathaniel_story_unlocked','true');
      alert('Birthday Adventure unlocked!');
    }
    updateStoryBtn();
  }else if(pw!==null){
    alert('Wrong password!');
  }
}

// ===== PASSWORD-PROTECTED RESET =====
function resetGame(){
  const pw=prompt('Enter password to reset:');
  if(pw==='2020'){
    if(confirm('I-clear lahat ng data? Scores, stars, items, at story progress?')){
      localStorage.removeItem('nathaniel_scores');
      localStorage.removeItem('nathaniel_store');
      localStorage.removeItem('nathaniel_wrong');
      localStorage.removeItem('nathaniel_story');
      localStorage.removeItem('nathaniel_story_unlocked');
      alert('Game data cleared!');
      location.reload();
    }
  }else if(pw!==null){
    alert('Wrong password!');
  }
}
