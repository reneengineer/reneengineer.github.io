<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Workout</title>
<link rel="preload" as="image" href="exercises/01-goblet-squat.png">
<link rel="preload" as="image" href="exercises/02-dumbbell-row.png">
<link rel="preload" as="image" href="exercises/03-dumbbell-floor-press.png">
<link rel="preload" as="image" href="exercises/04-dumbbell-romanian-deadlift.png">
<link rel="preload" as="image" href="exercises/05-dumbbell-overhead-press.png">
<link rel="preload" as="image" href="exercises/06-farmers-carry.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000000;
  --surface: #141414;
  --text: #e8e8e8;
  --muted: #888;
  --accent: #4ade80;
  --rest-accent: #facc15;
  --done-color: #4ade80;
  --pending-color: #333;
  --current-color: #facc15;
}
html, body {
  height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: manipulation;
  overflow: hidden;
}
#app {
  height: 100dvh;
  width: 100vw;
  position: relative;
}
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  width: 100%;
  padding: 1.5rem;
  position: absolute;
  top: 0; left: 0;
}
.screen.active { display: flex; }

/* Tap flash overlay */
#tap-flash {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(74, 222, 128, 0.12);
  pointer-events: none;
  opacity: 0;
  z-index: 50;
  transition: opacity 0.15s;
}
#tap-flash.flash { opacity: 1; transition: none; }

/* Top bar */
#top-bar {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  z-index: 20;
  display: none;
}
#progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface);
}
#progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
  width: 0%;
}
#btn-home {
  position: fixed;
  top: 10px;
  left: 12px;
  z-index: 30;
  background: rgba(20,20,20,0.85);
  border: none;
  color: var(--muted);
  font-size: 1.3rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#btn-home:active { opacity: 0.6; }
#btn-nav {
  position: fixed;
  top: 10px;
  right: 12px;
  z-index: 30;
  background: rgba(20,20,20,0.85);
  border: none;
  color: var(--muted);
  font-size: 1.1rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#btn-nav:active { opacity: 0.6; }

/* Exercise picker overlay */
#picker-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 40;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem;
  padding-top: 2rem;
  overflow-y: auto;
}
#picker-overlay.active { display: flex; }
#picker-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1.2rem;
}
.picker-round { width: 100%; max-width: 360px; margin-bottom: 1.2rem; }
.picker-round-label {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}
.picker-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.7rem 0.8rem;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  color: var(--text);
  font-family: inherit;
}
.picker-item:active { background: var(--surface); }
.picker-item.current { background: var(--surface); }
.picker-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.picker-dot.done { background: var(--done-color); }
.picker-dot.current { background: var(--current-color); }
.picker-dot.pending { background: var(--pending-color); }
.picker-name { font-size: 0.95rem; font-weight: 600; flex: 1; }
.picker-reps { font-size: 0.8rem; color: var(--muted); }
.picker-name.done-text { color: var(--muted); }
#picker-close {
  margin-top: 0.5rem;
  margin-bottom: 1.5rem;
  background: var(--surface);
  border: none;
  color: var(--text);
  padding: 0.8rem 2.5rem;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
#picker-close:active { opacity: 0.6; }

/* Start screen */
#start-screen h1 {
  font-size: clamp(2.5rem, 10vw, 4rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 0.3rem;
}
#start-subtitle {
  color: var(--muted);
  font-size: clamp(1rem, 3.5vw, 1.2rem);
  margin-bottom: 0.8rem;
}
#streak-display {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.3rem;
  min-height: 1.5rem;
}
#week-dots {
  display: flex;
  gap: 8px;
  margin-bottom: 2rem;
  align-items: center;
}
.week-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--muted);
}
.week-dot.worked { background: var(--accent); color: #000; }
.week-dot.empty { background: var(--surface); }
.week-dot.today { border: 2px solid var(--accent); }
#badday-suggest {
  color: var(--rest-accent);
  font-size: 0.85rem;
  margin-bottom: 1.5rem;
  min-height: 1.2rem;
}
#last-workout {
  color: var(--muted);
  font-size: 0.8rem;
  margin-top: 1rem;
}
.btn {
  width: 100%;
  max-width: 320px;
  padding: 1.2rem;
  border: none;
  border-radius: 12px;
  font-size: clamp(1.1rem, 4vw, 1.3rem);
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:active { opacity: 0.7; }
.btn-primary {
  background: var(--accent);
  color: #000;
  margin-bottom: 1rem;
}
.btn-secondary {
  background: var(--surface);
  color: var(--muted);
}

/* Countdown screen */
#countdown-screen {
  background: var(--bg);
}
#countdown-number {
  font-size: clamp(8rem, 35vw, 14rem);
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}
#countdown-label {
  font-size: 1.1rem;
  color: var(--muted);
  margin-top: 0.5rem;
}

/* Exercise screen */
#exercise-screen { cursor: pointer; padding-top: 3.5rem; }
#exercise-meta {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 0.8rem;
}
#exercise-counter {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
#exercise-img {
  max-width: 85vw;
  max-height: 32vh;
  object-fit: contain;
  border-radius: 12px;
  margin-bottom: 1rem;
  background: var(--surface);
}
#exercise-name {
  font-size: clamp(1.8rem, 6vw, 2.5rem);
  font-weight: 800;
  margin-bottom: 0.4rem;
}
#exercise-reps {
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 1rem;
}
#exercise-tips {
  list-style: none;
  max-width: 340px;
  text-align: left;
}
#exercise-tips li {
  font-size: clamp(0.85rem, 3.2vw, 1rem);
  color: var(--muted);
  padding: 0.3rem 0;
  padding-left: 1.2rem;
  position: relative;
}
#exercise-tips li::before {
  content: "";
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}
#tap-hint {
  position: fixed;
  bottom: 2rem;
  color: var(--muted);
  font-size: 0.8rem;
  transition: opacity 0.5s;
}

/* Rest screen */
#rest-screen { background: var(--bg); }
#rest-label {
  font-size: clamp(1rem, 4vw, 1.3rem);
  color: var(--muted);
  margin-bottom: 1rem;
}
#rest-timer {
  font-size: clamp(5rem, 22vw, 9rem);
  font-weight: 800;
  color: var(--rest-accent);
  line-height: 1;
  margin-bottom: 0.3rem;
}
#rest-next {
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 0.3rem;
  font-weight: 600;
}
#rest-sub {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 2rem;
}
.btn-skip {
  background: transparent;
  border: 2px solid var(--muted);
  color: var(--muted);
  padding: 0.8rem 2rem;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-skip:active { opacity: 0.6; }

/* Done screen */
#done-screen h1 {
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
#done-msg {
  color: var(--muted);
  font-size: clamp(1rem, 3.5vw, 1.2rem);
  margin-bottom: 0.3rem;
}
#done-time {
  color: var(--accent);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 2.5rem;
}
</style>
</head>
<body>
<div id="app">
  <div id="tap-flash"></div>
  <div id="top-bar">
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <button id="btn-home">&times;</button>
  <button id="btn-nav">&#9776;</button>

  <!-- EXERCISE PICKER -->
  <div id="picker-overlay">
    <div id="picker-title">EXERCISES</div>
    <div id="picker-list"></div>
    <button id="picker-close">CLOSE</button>
  </div>

  <!-- START -->
  <div id="start-screen" class="screen active">
    <h1>WORKOUT</h1>
    <div id="start-subtitle">6 exercises. 3 rounds. Tap to go.</div>
    <div id="streak-display"></div>
    <div id="week-dots"></div>
    <div id="badday-suggest"></div>
    <button class="btn btn-primary" id="btn-start">START</button>
    <button class="btn btn-secondary" id="btn-badday">BAD DAY</button>
    <div id="last-workout"></div>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown-screen" class="screen">
    <div id="countdown-number">3</div>
    <div id="countdown-label">get ready</div>
  </div>

  <!-- EXERCISE -->
  <div id="exercise-screen" class="screen">
    <span id="exercise-meta"></span>
    <div id="exercise-counter"></div>
    <img id="exercise-img" src="" alt="">
    <div id="exercise-name"></div>
    <div id="exercise-reps"></div>
    <ul id="exercise-tips"></ul>
    <div id="tap-hint">tap or swipe to continue</div>
  </div>

  <!-- REST -->
  <div id="rest-screen" class="screen">
    <div id="rest-label">REST</div>
    <div id="rest-timer">60</div>
    <div id="rest-next"></div>
    <div id="rest-sub"></div>
    <button class="btn-skip" id="btn-skip">SKIP</button>
  </div>

  <!-- DONE -->
  <div id="done-screen" class="screen">
    <h1>DONE</h1>
    <p id="done-msg">3 rounds complete</p>
    <div id="done-time"></div>
    <button class="btn btn-primary" id="btn-again">AGAIN</button>
  </div>
</div>

<script>
(function() {
  const ALL_EXERCISES = [
    {
      name: "Goblet Squat",
      image: "exercises/01-goblet-squat.png",
      reps: "12 reps",
      tips: [
        "Hold dumbbell at chest, elbows down",
        "Feet shoulder-width, toes slightly out",
        "Sit back and down, chest upright",
        "Push through heels to stand"
      ]
    },
    {
      name: "Dumbbell Row",
      image: "exercises/02-dumbbell-row.png",
      reps: "10 reps each arm",
      tips: [
        "One hand on sturdy surface for support",
        "Pull dumbbell to hip, not shoulder",
        "Squeeze shoulder blade at the top",
        "Lower with control, full extension"
      ]
    },
    {
      name: "Floor Press",
      image: "exercises/03-dumbbell-floor-press.png",
      reps: "12 reps",
      tips: [
        "Lie flat, knees bent, feet flat",
        "Press dumbbells straight up over chest",
        "Lower until triceps touch the floor",
        "Pause at bottom, then press up"
      ]
    },
    {
      name: "Romanian Deadlift",
      image: "exercises/04-dumbbell-romanian-deadlift.png",
      reps: "12 reps",
      tips: [
        "Hold dumbbells in front of thighs",
        "Hinge at hips, push them back",
        "Slight knee bend, keep back flat",
        "Feel hamstring stretch, squeeze glutes to stand"
      ]
    },
    {
      name: "Overhead Press",
      image: "exercises/05-dumbbell-overhead-press.png",
      reps: "10 reps",
      tips: [
        "Dumbbells at shoulder height",
        "Brace core, press straight overhead",
        "Lock out arms at the top",
        "Lower with control to shoulders"
      ]
    },
    {
      name: "Farmer's Carry",
      image: "exercises/06-farmers-carry.png",
      reps: "30 seconds",
      tips: [
        "Hold heavy dumbbells at your sides",
        "Stand tall, shoulders back and down",
        "Walk with short, controlled steps",
        "Squeeze grip hard the entire time"
      ]
    }
  ];

  const TOTAL_ROUNDS = 3;
  const REST_DURATION = 60;
  const completed = [];
  let wakeLock = null;
  let workoutStartTime = null;

  const state = {
    screen: "start",
    exercises: ALL_EXERCISES,
    round: 0,
    exercise: 0,
    totalRounds: TOTAL_ROUNDS,
    restTime: REST_DURATION,
    restTimer: null,
    badDay: false,
    tapped: false
  };

  const $ = id => document.getElementById(id);
  const screens = {
    start: $("start-screen"),
    countdown: $("countdown-screen"),
    exercise: $("exercise-screen"),
    rest: $("rest-screen"),
    done: $("done-screen")
  };
  const topBar = $("top-bar");
  const btnHome = $("btn-home");
  const btnNav = $("btn-nav");
  const progressFill = $("progress-fill");
  const exMeta = $("exercise-meta");
  const exCounter = $("exercise-counter");
  const exImg = $("exercise-img");
  const exName = $("exercise-name");
  const exReps = $("exercise-reps");
  const exTips = $("exercise-tips");
  const tapHint = $("tap-hint");
  const restTimerEl = $("rest-timer");
  const restNext = $("rest-next");
  const restSub = $("rest-sub");
  const lastWorkoutEl = $("last-workout");
  const doneMsg = $("done-msg");
  const doneTime = $("done-time");
  const pickerOverlay = $("picker-overlay");
  const pickerList = $("picker-list");
  const tapFlash = $("tap-flash");
  const streakDisplay = $("streak-display");
  const weekDots = $("week-dots");
  const baddaySuggest = $("badday-suggest");

  // Wake Lock
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch(e) {}
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  }

  // Workout history via localStorage
  function getWorkoutDays() {
    try {
      const raw = localStorage.getItem("workoutDays");
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveWorkoutDay() {
    try {
      const days = getWorkoutDays();
      const today = new Date().toISOString().slice(0, 10);
      if (!days.includes(today)) days.push(today);
      // keep last 90 days
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 90);
      const filtered = days.filter(d => new Date(d) >= cutoff);
      localStorage.setItem("workoutDays", JSON.stringify(filtered));
      localStorage.setItem("lastWorkout", Date.now());
    } catch(e) {}
  }

  function calcStreak() {
    const days = getWorkoutDays().sort().reverse();
    if (!days.length) return 0;
    let streak = 0;
    const today = new Date(); today.setHours(0,0,0,0);
    const check = new Date(today);
    // allow today or yesterday as start
    const last = new Date(days[0]); last.setHours(0,0,0,0);
    const diffMs = today - last;
    if (diffMs > 86400000) return 0; // more than 1 day ago
    for (let i = 0; i < 365; i++) {
      const dateStr = check.toISOString().slice(0, 10);
      if (days.includes(dateStr)) {
        streak++;
        check.setDate(check.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function renderStreak() {
    const streak = calcStreak();
    if (streak > 0) {
      streakDisplay.textContent = streak + " day streak";
    } else {
      streakDisplay.textContent = "";
    }
  }

  function renderWeekDots() {
    const days = getWorkoutDays();
    const dayNames = ["M", "T", "W", "T", "F", "S", "S"];
    const today = new Date();
    const dayOfWeek = (today.getDay() + 6) % 7; // Monday = 0
    weekDots.innerHTML = "";
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - dayOfWeek + i);
      const dateStr = d.toISOString().slice(0, 10);
      const dot = document.createElement("div");
      const worked = days.includes(dateStr);
      const isToday = i === dayOfWeek;
      dot.className = "week-dot " + (worked ? "worked" : "empty") + (isToday ? " today" : "");
      dot.textContent = dayNames[i];
      weekDots.appendChild(dot);
    }
  }

  function renderBaddaySuggest() {
    try {
      const ts = localStorage.getItem("lastWorkout");
      if (!ts) { baddaySuggest.textContent = ""; return; }
      const days = Math.floor((Date.now() - Number(ts)) / 86400000);
      if (days >= 3) {
        baddaySuggest.textContent = "Been a few days. Try a quick Bad Day round?";
      } else {
        baddaySuggest.textContent = "";
      }
    } catch(e) {}
  }

  function initCompleted() {
    completed.length = 0;
    for (let r = 0; r < state.totalRounds; r++) {
      completed.push(new Array(state.exercises.length).fill(false));
    }
  }

  function showScreen(name) {
    state.screen = name;
    Object.entries(screens).forEach(([k, el]) => {
      el.classList.toggle("active", k === name);
    });
    const showControls = name === "exercise" || name === "rest";
    topBar.style.display = showControls ? "block" : "none";
    btnHome.style.display = showControls ? "flex" : "none";
    btnNav.style.display = showControls ? "flex" : "none";
  }

  function updateProgress() {
    const total = state.exercises.length * state.totalRounds;
    let done = 0;
    for (let r = 0; r < state.totalRounds; r++) {
      for (let e = 0; e < state.exercises.length; e++) {
        if (completed[r] && completed[r][e]) done++;
      }
    }
    progressFill.style.width = (done / total * 100) + "%";
  }

  function getTotalDone() {
    let done = 0;
    for (let r = 0; r < state.totalRounds; r++) {
      for (let e = 0; e < state.exercises.length; e++) {
        if (completed[r] && completed[r][e]) done++;
      }
    }
    return done;
  }

  function renderExercise() {
    const ex = state.exercises[state.exercise];
    const total = state.exercises.length * state.totalRounds;
    const done = getTotalDone();
    exMeta.textContent = `Round ${state.round + 1}/${state.totalRounds}  \u00B7  Exercise ${state.exercise + 1}/${state.exercises.length}`;
    exCounter.textContent = `${done + 1} of ${total}`;
    exImg.src = ex.image;
    exImg.alt = ex.name;
    exName.textContent = ex.name;
    exReps.textContent = ex.reps;
    exTips.innerHTML = ex.tips.map(t => `<li>${t}</li>`).join("");
    updateProgress();
    if (!state.tapped) tapHint.style.opacity = "1";
  }

  // 3-2-1-GO countdown
  function startCountdown(badDay, cb) {
    showScreen("countdown");
    const numEl = $("countdown-number");
    const labelEl = $("countdown-label");
    let count = 3;
    numEl.textContent = count;
    labelEl.textContent = "get ready";
    requestWakeLock();
    const iv = setInterval(() => {
      count--;
      if (count > 0) {
        numEl.textContent = count;
        beep(600, 80);
      } else if (count === 0) {
        numEl.textContent = "GO";
        labelEl.textContent = "";
        beep(900, 150);
      } else {
        clearInterval(iv);
        cb();
      }
    }, 1000);
    beep(600, 80);
  }

  function startWorkout(badDay) {
    state.badDay = badDay;
    state.exercises = badDay ? ALL_EXERCISES.slice(0, 3) : ALL_EXERCISES;
    state.totalRounds = TOTAL_ROUNDS;
    state.round = 0;
    state.exercise = 0;
    state.tapped = false;
    tapHint.style.opacity = "1";
    initCompleted();
    startCountdown(badDay, () => {
      workoutStartTime = Date.now();
      renderExercise();
      showScreen("exercise");
    });
  }

  function flashTap() {
    tapFlash.classList.add("flash");
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        tapFlash.classList.remove("flash");
      });
    });
  }

  function nextExercise() {
    if (navigator.vibrate) navigator.vibrate(15);
    flashTap();
    if (!state.tapped) {
      state.tapped = true;
      tapHint.style.opacity = "0";
    }
    completed[state.round][state.exercise] = true;
    state.exercise++;
    if (state.exercise >= state.exercises.length) {
      state.round++;
      if (state.round >= state.totalRounds) {
        finishWorkout();
        return;
      }
      startRest();
      return;
    }
    renderExercise();
  }

  function prevExercise() {
    if (state.round === 0 && state.exercise === 0) return;
    if (navigator.vibrate) navigator.vibrate(15);
    if (state.exercise > 0) {
      state.exercise--;
    } else if (state.round > 0) {
      state.round--;
      state.exercise = state.exercises.length - 1;
    }
    renderExercise();
  }

  function jumpTo(round, exercise) {
    if (state.restTimer) { clearInterval(state.restTimer); state.restTimer = null; }
    state.round = round;
    state.exercise = exercise;
    closePicker();
    renderExercise();
    showScreen("exercise");
  }

  // Speech announcement
  function announceNext(name) {
    try {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance("Next up: " + name);
        u.rate = 1.1;
        u.volume = 0.8;
        speechSynthesis.speak(u);
      }
    } catch(e) {}
  }

  function startRest() {
    state.restTime = REST_DURATION;
    restTimerEl.textContent = state.restTime;
    restSub.textContent = `Round ${state.round}/${state.totalRounds} complete`;
    const nextEx = state.exercises[0];
    restNext.textContent = nextEx ? "Next: " + nextEx.name : "";
    showScreen("rest");
    let announced = false;
    state.restTimer = setInterval(() => {
      state.restTime--;
      restTimerEl.textContent = state.restTime;
      if (state.restTime === 5 && !announced && nextEx) {
        announced = true;
        announceNext(nextEx.name);
      }
      if (state.restTime <= 3 && state.restTime > 0) beep(600, 80);
      if (state.restTime <= 0) {
        beep(900, 200);
        endRest();
      }
    }, 1000);
  }

  function endRest() {
    clearInterval(state.restTimer);
    state.restTimer = null;
    state.exercise = 0;
    renderExercise();
    showScreen("exercise");
  }

  function finishWorkout() {
    progressFill.style.width = "100%";
    releaseWakeLock();
    const elapsed = workoutStartTime ? Math.floor((Date.now() - workoutStartTime) / 1000) : 0;
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    const total = state.exercises.length * state.totalRounds;
    const label = state.badDay ? `${state.totalRounds} rounds (bad day mode)` : `${state.totalRounds} rounds complete`;
    doneMsg.textContent = label;
    doneTime.textContent = `${total} exercises in ${mins}:${secs.toString().padStart(2, "0")}`;
    saveWorkoutDay();
    showScreen("done");
  }

  function goHome() {
    if (state.restTimer) { clearInterval(state.restTimer); state.restTimer = null; }
    releaseWakeLock();
    closePicker();
    showScreen("start");
    renderHomeScreen();
  }

  // Picker
  function openPicker() {
    pickerList.innerHTML = "";
    for (let r = 0; r < state.totalRounds; r++) {
      const roundDiv = document.createElement("div");
      roundDiv.className = "picker-round";
      const label = document.createElement("div");
      label.className = "picker-round-label";
      label.textContent = `Round ${r + 1}`;
      roundDiv.appendChild(label);
      for (let e = 0; e < state.exercises.length; e++) {
        const ex = state.exercises[e];
        const isCurrent = r === state.round && e === state.exercise;
        const isDone = completed[r] && completed[r][e];
        const item = document.createElement("button");
        item.className = "picker-item" + (isCurrent ? " current" : "");
        const dot = document.createElement("span");
        dot.className = "picker-dot " + (isDone ? "done" : isCurrent ? "current" : "pending");
        const name = document.createElement("span");
        name.className = "picker-name" + (isDone ? " done-text" : "");
        name.textContent = ex.name;
        const reps = document.createElement("span");
        reps.className = "picker-reps";
        reps.textContent = ex.reps;
        item.appendChild(dot);
        item.appendChild(name);
        item.appendChild(reps);
        const rr = r, ee = e;
        item.addEventListener("click", () => jumpTo(rr, ee));
        roundDiv.appendChild(item);
      }
      pickerList.appendChild(roundDiv);
    }
    pickerOverlay.classList.add("active");
  }
  function closePicker() { pickerOverlay.classList.remove("active"); }

  function showLastWorkout() {
    try {
      const ts = localStorage.getItem("lastWorkout");
      if (!ts) return;
      const days = Math.floor((Date.now() - Number(ts)) / 86400000);
      if (days === 0) lastWorkoutEl.textContent = "Last workout: today";
      else if (days === 1) lastWorkoutEl.textContent = "Last workout: yesterday";
      else lastWorkoutEl.textContent = `Last workout: ${days} days ago`;
    } catch(e) {}
  }

  function renderHomeScreen() {
    renderStreak();
    renderWeekDots();
    renderBaddaySuggest();
    showLastWorkout();
  }

  // Audio
  let audioCtx;
  function beep(freq, ms) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.value = 0.1;
      osc.start();
      osc.stop(audioCtx.currentTime + ms / 1000);
    } catch(e) {}
  }

  // Swipe detection
  let touchStartX = 0, touchStartY = 0;
  document.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener("touchend", (e) => {
    if (state.screen !== "exercise") return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return; // not a horizontal swipe
    e.preventDefault();
    if (dx < -50) nextExercise();  // swipe left = next
    if (dx > 50) prevExercise();   // swipe right = prev
  });

  // Events
  $("btn-start").addEventListener("click", () => startWorkout(false));
  $("btn-badday").addEventListener("click", () => startWorkout(true));
  $("exercise-screen").addEventListener("click", (e) => {
    if (e.target.id === "btn-home" || e.target.id === "btn-nav") return;
    nextExercise();
  });
  btnHome.addEventListener("click", (e) => { e.stopPropagation(); goHome(); });
  btnNav.addEventListener("click", (e) => { e.stopPropagation(); openPicker(); });
  $("btn-skip").addEventListener("click", endRest);
  $("btn-again").addEventListener("click", () => { showScreen("start"); renderHomeScreen(); });
  $("picker-close").addEventListener("click", closePicker);
  // Tap rest screen to skip
  $("rest-screen").addEventListener("click", (e) => {
    if (e.target.id === "btn-skip" || e.target.id === "btn-home" || e.target.id === "btn-nav") return;
    endRest();
  });

  // Re-acquire wake lock on visibility change
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && (state.screen === "exercise" || state.screen === "rest")) {
      requestWakeLock();
    }
  });

  // Init
  renderHomeScreen();
})();
</script>
</body>
</html>
